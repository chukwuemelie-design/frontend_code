name: Build and push docker image

on:
  push:

jobs:
  build_and_push1:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build
        run: |
          echo "MONGO_USER=chukwuemelieoguejiofor_db_user" >> .env
          echo "MONGO_PASSWORD=68XZ2P2RRCCNxTR4" >> .env
          echo "MONGO_CLUSTER=cluster0.hqahfia.mongodb.net/" >> .env
          docker build -t netflix_frontend:latest .

      - name: Docker push
        run: |
          # Tag the image for ECR
          docker tag netflix_frontend:latest 618756493952.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:latest:${{ github.run_number }}
          # Push the tagged image
          docker push 618756493952.dkr.ecr.us-east-2.amazonaws.com/netflix_frontend:latest:${{ github.run_number }}